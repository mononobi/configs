services:
  conduit:
    image: ghcr.io/psiphon-inc/conduit/cli:latest
    container_name: conduit
    restart: unless-stopped
    network_mode: host
    # This forces the container to run as your primary user
    user: "1000:1000"
    command: start --max-common-clients 75 --bandwidth 8 --data-dir /app/data
    # This is the magic label that invites Watchtower in to update this container
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - ./data:/app/data

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    # Allows Prometheus to talk to Conduit on the host network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Mapped to 9091 locally to avoid clashing with Conduit's default 9090 port
      - "127.0.0.1:9091:9090"
    # This is the magic label that invites Watchtower in to update this container
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      # Securely bound to localhost only
      - "127.0.0.1:3030:3000"
    # This is the magic label that invites Watchtower in to update this container
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  prometheus_data:
  grafana_data:
